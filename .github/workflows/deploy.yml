name: Build and Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all" for all services)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - accounts
          - contacts
          - leads
          - opportunities
          - workorders
          - quotes
          - invoices
          - auth
          - workflows
          - documents
          - integrations
          - bamboogli

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 679128292059.dkr.ecr.us-east-2.amazonaws.com
  ECS_CLUSTER: panda-crm-cluster

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: accounts
            port: 3001
          - name: contacts
            port: 3002
          - name: leads
            port: 3003
          - name: opportunities
            port: 3004
          - name: workorders
            port: 3005
          - name: quotes
            port: 3006
          - name: invoices
            port: 3007
          - name: auth
            port: 3000
          - name: workflows
            port: 3008
          - name: documents
            port: 3009
          - name: integrations
            port: 3010
          - name: bamboogli
            port: 3012

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if service should be deployed
        id: check
        run: |
          if [ "${{ github.event.inputs.service }}" = "all" ] || [ "${{ github.event.inputs.service }}" = "${{ matrix.service.name }}" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Check AWS credentials are configured
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::AWS credentials not configured. Please add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to repository secrets."
            exit 1
          fi
          echo "AWS credentials are configured"

      - name: Configure AWS credentials
        if: steps.check.outputs.should_deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.check.outputs.should_deploy == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        if: steps.check.outputs.should_deploy == 'true'
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_NAME: ${{ matrix.service.name }}
        run: |
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Build Docker image
          docker build \
            --build-arg BUILD_SHA=$IMAGE_TAG \
            --build-arg BUILD_TIME="$BUILD_TIME" \
            -t $ECR_REGISTRY/panda-crm/$SERVICE_NAME:$IMAGE_TAG \
            -t $ECR_REGISTRY/panda-crm/$SERVICE_NAME:latest \
            -f services/$SERVICE_NAME/Dockerfile \
            .

          # Push to ECR
          docker push $ECR_REGISTRY/panda-crm/$SERVICE_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/panda-crm/$SERVICE_NAME:latest

      - name: Resolve image digest
        if: steps.check.outputs.should_deploy == 'true'
        id: image
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_NAME: ${{ matrix.service.name }}
        run: |
          IMAGE_DIGEST=$(aws ecr describe-images \
            --repository-name panda-crm/$SERVICE_NAME \
            --image-ids imageTag=$IMAGE_TAG \
            --region $AWS_REGION \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          if [ -z "$IMAGE_DIGEST" ] || [ "$IMAGE_DIGEST" = "None" ]; then
            echo "::error::Unable to resolve ECR digest for panda-crm/$SERVICE_NAME:$IMAGE_TAG"
            exit 1
          fi

          IMAGE_REF="$ECR_REGISTRY/panda-crm/$SERVICE_NAME@$IMAGE_DIGEST"
          echo "image_ref=$IMAGE_REF" >> $GITHUB_OUTPUT
          echo "Resolved image: $IMAGE_REF"

      - name: Update ECS service with pinned task definition
        if: steps.check.outputs.should_deploy == 'true'
        env:
          SERVICE_NAME: ${{ matrix.service.name }}
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
        run: |
          set -euo pipefail

          # Resolve actual ECS service name safely across legacy/current naming schemes.
          CANDIDATES=(
            "panda-crm-$SERVICE_NAME"
            "$SERVICE_NAME-service"
            "$SERVICE_NAME"
          )

          ECS_SERVICE_NAME=""
          for CANDIDATE in "${CANDIDATES[@]}"; do
            COUNT=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$CANDIDATE" \
              --region "$AWS_REGION" \
              --query 'length(services[?status!=`INACTIVE`])' \
              --output text 2>/dev/null || echo "0")
            if [ "${COUNT:-0}" = "1" ]; then
              ECS_SERVICE_NAME="$CANDIDATE"
              break
            fi
          done

          if [ -z "$ECS_SERVICE_NAME" ]; then
            echo "::error::No active ECS service found for $SERVICE_NAME (checked: ${CANDIDATES[*]})"
            exit 1
          fi

          echo "Resolved ECS service: $ECS_SERVICE_NAME"

          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_NAME" \
            --region "$AWS_REGION" \
            --query 'services[0].taskDefinition' \
            --output text)

          if [ -z "$CURRENT_TASK_DEF_ARN" ] || [ "$CURRENT_TASK_DEF_ARN" = "None" ]; then
            echo "::error::Unable to resolve current task definition for service $ECS_SERVICE_NAME"
            exit 1
          fi

          echo "Current task definition: $CURRENT_TASK_DEF_ARN"

          NEW_TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --region "$AWS_REGION" \
            --query 'taskDefinition' \
            --output json | jq \
              --arg IMAGE_REF "$IMAGE_REF" \
              --arg CONTAINER_NAME "$SERVICE_NAME" \
              '
              .containerDefinitions = (
                .containerDefinitions
                | if any(.[]; .name == $CONTAINER_NAME)
                  then map(if .name == $CONTAINER_NAME then .image = $IMAGE_REF else . end)
                  else (.[0].image = $IMAGE_REF | .)
                  end
              )
              | del(
                  .taskDefinitionArn,
                  .revision,
                  .status,
                  .requiresAttributes,
                  .compatibilities,
                  .registeredAt,
                  .registeredBy,
                  .deregisteredAt
                )
              ')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --region "$AWS_REGION" \
            --cli-input-json "$NEW_TASK_DEF_JSON" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered task definition: $NEW_TASK_DEF_ARN"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_NAME" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment \
            --region "$AWS_REGION"

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_NAME" \
            --region "$AWS_REGION"

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Notify success
        if: needs.build-and-push.result == 'success'
        run: echo "✅ Deployment completed successfully!"

      - name: Notify failure
        if: needs.build-and-push.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          exit 1
