name: Build and Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all" for all services)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - accounts
          - contacts
          - leads
          - opportunities
          - notifications
          - workorders
          - quotes
          - invoices
          - auth
          - workflows
          - documents
          - integrations
          - bamboogli
          - notifications
          - photocam

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 679128292059.dkr.ecr.us-east-2.amazonaws.com
  ECS_CLUSTER: panda-crm-cluster

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: accounts
            port: 3001
          - name: contacts
            port: 3002
          - name: leads
            port: 3003
          - name: opportunities
            port: 3004
          - name: notifications
            port: 3011
          - name: workorders
            port: 3005
          - name: quotes
            port: 3006
          - name: invoices
            port: 3007
          - name: auth
            port: 3000
          - name: workflows
            port: 3008
          - name: documents
            port: 3009
          - name: integrations
            port: 3010
          - name: bamboogli
            port: 3012
          - name: notifications
            port: 3011
          - name: photocam
            port: 3013

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if service should be deployed
        id: check
        run: |
          if [ "${{ github.event.inputs.service }}" = "all" ] || [ "${{ github.event.inputs.service }}" = "${{ matrix.service.name }}" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Check AWS credentials are configured
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::AWS credentials not configured. Please add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to repository secrets."
            exit 1
          fi
          echo "AWS credentials are configured"

      - name: Configure AWS credentials
        if: steps.check.outputs.should_deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.check.outputs.should_deploy == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        if: steps.check.outputs.should_deploy == 'true'
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_NAME: ${{ matrix.service.name }}
        run: |
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          IMAGE_REPO=""

          if aws ecr describe-repositories --repository-names "panda-crm/$SERVICE_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            IMAGE_REPO="panda-crm/$SERVICE_NAME"
          elif aws ecr describe-repositories --repository-names "panda-crm-$SERVICE_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            IMAGE_REPO="panda-crm-$SERVICE_NAME"
          else
            echo "::error::No ECR repository found for $SERVICE_NAME. Expected panda-crm/$SERVICE_NAME or panda-crm-$SERVICE_NAME"
            exit 1
          fi

          echo "Using ECR repository: $IMAGE_REPO"

          # Build Docker image
          docker build \
            --build-arg BUILD_SHA=$IMAGE_TAG \
            --build-arg BUILD_TIME="$BUILD_TIME" \
            -t $ECR_REGISTRY/$IMAGE_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$IMAGE_REPO:latest \
            -f services/$SERVICE_NAME/Dockerfile \
            .

          # Push to ECR
          docker push $ECR_REGISTRY/$IMAGE_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$IMAGE_REPO:latest

      - name: Update ECS Service
        if: steps.check.outputs.should_deploy == 'true'
        env:
          SERVICE_NAME: ${{ matrix.service.name }}
        run: |
          ECS_SERVICE=""
          for candidate in "$SERVICE_NAME-service" "panda-crm-$SERVICE_NAME" "$SERVICE_NAME"; do
            if aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$candidate" --region "$AWS_REGION" --query 'services[0].status' --output text 2>/dev/null | grep -qE 'ACTIVE|DRAINING'; then
              ECS_SERVICE="$candidate"
              break
            fi
          done

          if [ -z "$ECS_SERVICE" ]; then
            echo "::warning::No ECS service found for $SERVICE_NAME. Checked $SERVICE_NAME-service, panda-crm-$SERVICE_NAME, and $SERVICE_NAME"
            exit 0
          fi

          echo "Updating ECS service: $ECS_SERVICE"
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Notify success
        if: needs.build-and-push.result == 'success'
        run: echo "✅ Deployment completed successfully!"

      - name: Notify failure
        if: needs.build-and-push.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          exit 1
