name: Build and Deploy Root Shell + Analytics

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  S3_BUCKET: panda-crm-frontend-prod
  CLOUDFRONT_DISTRIBUTION_ID: EDKIMD3LRK2M8
  ANALYTICS_FUNCTION_NAME: analytics-spa-rewrite

jobs:
  build-and-deploy:
    name: Build and Deploy Root Shell + Analytics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch secrets from AWS Secrets Manager
        id: secrets
        run: |
          GOOGLE_MAPS_SECRET=$(aws secretsmanager get-secret-value --secret-id panda-crm/google-maps --query SecretString --output text)
          GOOGLE_MAPS_API_KEY=$(echo $GOOGLE_MAPS_SECRET | jq -r '.apiKey')
          echo "VITE_GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" >> $GITHUB_ENV
          echo "::add-mask::$GOOGLE_MAPS_API_KEY"

      - name: Deploy coordinated root shell and analytics release
        env:
          VITE_API_BASE: https://bamboo.pandaadmin.com
          VITE_GOOGLE_MAPS_API_KEY: ${{ env.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.run_started_at }}
        run: ./scripts/deploy/root-and-analytics-prod.sh

      - name: Deployment complete
        run: echo "✅ Root shell and analytics deployed successfully!"
